# Render blueprint for the Trotxi API + Postgres.
#
# One-time setup: render.com → New → Blueprint → connect this repo → Apply.
# Day-to-day deploys are driven by GitHub Actions (.github/workflows/deploy.yml):
# CI green on main → staging deploys automatically → production after a manual
# approval in GitHub. autoDeploy is therefore off — Actions calls the Render API.
databases:
  - name: trotxi-db-staging
    databaseName: trotxi
    user: trotxi
    plan: free # NB: free Postgres expires ~30 days after creation
    region: frankfurt # closest Render region to Ghana

# Shared config for the ask-dispatch cron jobs (E3). The cron mints a short-lived
# admin token, so its JWT_SECRET MUST equal the web service's JWT_SECRET — set it
# once here in the dashboard and all four crons inherit it. API_BASE_URL is the
# public staging URL (not a secret).
envVarGroups:
  - name: trotxi-cron-staging
    envVars:
      - key: JWT_SECRET
        sync: false # set in dashboard; MUST match trotxi-api-staging's JWT_SECRET
      - key: API_BASE_URL
        value: https://trotxi-api-staging.onrender.com

services:
  - type: web
    name: trotxi-api-staging
    runtime: docker
    repo: https://github.com/TROTXI/mobility-core
    branch: main
    # Build from the repo root: the pnpm workspace lockfile lives there.
    dockerfilePath: services/api/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /healthz
    autoDeploy: false # GitHub Actions triggers deploys after CI passes
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trotxi-db-staging
          property: connectionString
      # Required because NODE_ENV=production (see ADR-0007). Set the value in the
      # Render dashboard; never commit it. Generate: openssl rand -base64 48
      - key: JWT_SECRET
        sync: false
      # Google "Web" OAuth client ID — the audience verified on sign-in. This is
      # PUBLIC (a Web client ID ships in clients; only a client *secret* would be
      # sensitive, and we don't use one), so it lives in the blueprint, not the
      # dashboard. Unset -> POST /auth/google returns 503.
      - key: GOOGLE_CLIENT_ID
        value: 431341307838-pc4m046v2lj18ssfnfl1g52fl5g1cg4q.apps.googleusercontent.com
      # Observability (#28). Set in the dashboard when Grafana Cloud is wired up.
      # METRICS_TOKEN gates GET /metrics (scraper sends it as a bearer token);
      # unset -> /metrics is disabled (404) in production.
      - key: METRICS_TOKEN
        sync: false
      # OpenTelemetry tracing → Grafana Cloud (Tempo) via OTLP/HTTP. Unset ->
      # tracing disabled. OTEL_EXPORTER_OTLP_HEADERS carries the Grafana auth,
      # e.g. "Authorization=Basic <base64 instanceID:token>".
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      - key: OTEL_SERVICE_NAME
        value: trotxi-api
      # Cloudflare R2 (avatars, #24) — S3-compatible object storage. The access
      # keys are secrets → set in the dashboard, never commit. All four unset ->
      # in-memory object store (no avatars persisted).
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false

  # ---- Ask-dispatch cron jobs (E3) — the daily confirmation loop ----
  # Each mints an admin token and POSTs a trigger on the deployed API. Windows are
  # from docs/features/reservations.md; Ghana is UTC (GMT+0) so schedules are plain
  # UTC. autoDeploy off — they redeploy with the API (GitHub Actions / manual).
  # NB: on Render, cron jobs may require a paid instance type; bump `plan` if so.
  # The free web service also sleeps when idle — the first trigger warms it (a
  # slow cold start), which is fine for the pilot.
  - type: cron
    name: trotxi-ask-morning-staging
    runtime: docker
    repo: https://github.com/TROTXI/mobility-core
    branch: main
    dockerfilePath: services/api/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    autoDeploy: false
    schedule: '0 18 * * *' # 18:00 — ask tomorrow-morning riders
    dockerCommand: node dist/cron/ask-dispatch-cron.js ask morning
    envVars:
      - fromGroup: trotxi-cron-staging
  - type: cron
    name: trotxi-resolve-morning-staging
    runtime: docker
    repo: https://github.com/TROTXI/mobility-core
    branch: main
    dockerfilePath: services/api/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    autoDeploy: false
    schedule: '0 21 * * *' # 21:00 cutoff — default-yes the still-pending (morning)
    dockerCommand: node dist/cron/ask-dispatch-cron.js resolve morning
    envVars:
      - fromGroup: trotxi-cron-staging
  - type: cron
    name: trotxi-ask-evening-staging
    runtime: docker
    repo: https://github.com/TROTXI/mobility-core
    branch: main
    dockerfilePath: services/api/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    autoDeploy: false
    schedule: '0 12 * * *' # 12:00 — ask this-evening riders
    dockerCommand: node dist/cron/ask-dispatch-cron.js ask evening
    envVars:
      - fromGroup: trotxi-cron-staging
  - type: cron
    name: trotxi-resolve-evening-staging
    runtime: docker
    repo: https://github.com/TROTXI/mobility-core
    branch: main
    dockerfilePath: services/api/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    autoDeploy: false
    schedule: '0 14 * * *' # 14:00 cutoff — default-yes the still-pending (evening)
    dockerCommand: node dist/cron/ask-dispatch-cron.js resolve evening
    envVars:
      - fromGroup: trotxi-cron-staging

  # ---- Production (uncomment when going live) ----
  # Needs a paid Postgres plan so data doesn't expire. After applying, set the
  # RENDER_PRODUCTION_SERVICE_ID + PRODUCTION_URL GitHub variables to activate
  # the production stage of deploy.yml (it is skipped until then).
