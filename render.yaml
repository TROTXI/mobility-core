  #     - key: NODE_ENV
  #       value: production
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: trotxi-db-production
  #         property: connectionString
  #     - key: JWT_SECRET
  #       sync: false   # required; set in dashboard (ADR-0007)
  #     - key: GOOGLE_CLIENT_ID
  #       sync: false   # set in dashboard
  #
  # …and add under `databases:`
