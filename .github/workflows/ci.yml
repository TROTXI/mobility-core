name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# New pushes to the same PR cancel the superseded run; pushes to main always
# run to completion so the history of main stays fully verified.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  format:
    name: Format (Prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  api:
    name: API (services/api)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trotxi/api run typecheck
      - run: pnpm --filter @trotxi/api run lint
      - run: pnpm --filter @trotxi/api run test:coverage
      - run: pnpm --filter @trotxi/api run build

  migrations:
    name: Migrations (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: trotxi
          POSTGRES_PASSWORD: trotxi
          POSTGRES_DB: trotxi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trotxi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://trotxi:trotxi@localhost:5432/trotxi
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trotxi/api run migrate
      # Idempotency: a second run must be a clean no-op.
      - run: pnpm --filter @trotxi/api run migrate

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Real Postgres so the suite exercises the Pg adapters end-to-end; the e2e
    # globalSetup migrates + seeds it. Specs self-skip the DB-backed cases when
    # DATABASE_URL is unset (local zero-infra runs).
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: trotxi
          POSTGRES_PASSWORD: trotxi
          POSTGRES_DB: trotxi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trotxi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://trotxi:trotxi@localhost:5432/trotxi
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trotxi/e2e test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  #Flutter jobs activate when the first app lands in apps/ — see apps/README.md.
  flutter:
    name: Flutter (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app: [trotxi_commuter, trotxi_driver]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
