services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: trotxi-postgres
    environment:
      POSTGRES_USER: trotxi
      POSTGRES_PASSWORD: trotxi
      POSTGRES_DB: trotxi
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trotxi']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trotxi-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.8
    container_name: trotxi-emqx
    ports:
      - '1883:1883'   # MQTT
      - '18083:18083' # Dashboard (admin/public)
    healthcheck:
      test: ['CMD', 'emqx', 'ctl', 'status']
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
